name: Fetch AI Feeds

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write   # ← IMPORTANT

jobs:
  fetch:
    runs-on: ubuntu-latest
    environment: collection_info

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run script
        env:
          ASTHA_API_KEY: ${{ secrets.ASTHA_API_KEY }}
          ENCODED_COLLECTION_TOKEN: ${{ secrets.ENCODED_COLLECTION_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: node scripts/fetch_feeds.js

      - name: Commit & push
        run: |
          git config user.name "astla-bot"
          git config user.email "bot@asthalavista.com"
          git add data/*.json
          git commit -m "update feeds" || echo "no changes"
          git push
