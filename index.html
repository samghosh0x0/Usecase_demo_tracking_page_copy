<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI Intelligence Feed</title>
</head>
<body style="font-family: Arial; padding: 20px; max-width: 900px; margin: auto;">

  <h1>AI Intelligence Feed (Last Week)</h1>

  <div style="margin-bottom: 20px;">

    <button onclick="showSummary()" style="margin-left: 10px;">
      Show Summary
    </button>
  </div>

  <!-- SUMMARY -->
  <div id="summary" style="
    margin-top:20px;
    padding:15px;
    background:#f5f5f5;
    border-radius:8px;
    white-space: pre-wrap;
  ">
    <i>Click "Show Summary" to view AI insights</i>
  </div>

  <!-- CONTENT -->
  <div id="content" style="margin-top:30px;"></div>

  <script>
    let currentData = null;

    async function loadData() {
      const cutoff = 7;

      try {
        const res = await fetch(`data/ai_feed_${cutoff}.json`);
        const data = await res.json();

        currentData = data;

        // Reset summary
        document.getElementById("summary").innerHTML =
          "<i>Click 'Show Summary' to view AI insights</i>";

        const container = document.getElementById("content");
        container.innerHTML = "";

        for (const [category, value] of Object.entries(data.categories)) {
          if (!value.items.length) continue;

          container.innerHTML += `
            <h2 style="margin-top:25px;">
              ${category.toUpperCase()} (${value.count})
            </h2>
          `;

          value.items.forEach(item => {
            container.innerHTML += `
              <div style="
                margin-bottom:15px;
                padding:10px;
                border-bottom:1px solid #ddd;
              ">
                <a href="${item.url}" target="_blank" style="text-decoration:none;">
                  <b>${item.subject}</b>
                </a>
                <p style="margin:5px 0;">${item.body}</p>
              </div>
            `;
          });
        }

      } catch (err) {
        console.error("Error loading data:", err);
        document.getElementById("content").innerHTML =
          "<p>⚠️ Failed to load data</p>";
      }
    }

    function showSummary() {
      if (!currentData || !currentData.summary) {
        document.getElementById("summary").innerText =
          "No summary available yet.";
        return;
      }

      document.getElementById("summary").innerText = currentData.summary;
    }

    loadData();
  </script>

</body>
</html>
